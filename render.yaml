services:
  - type: web
    name: caito-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: MODEL
        value: llama-3.3-70b-versatile
      - key: PORT
        value: "8000"
